    <script id="article-content" type="application/json">
      {
        "title": "Hva er industridesign i praksis?",
        "heroAlt": "Industridesign eksempel",
        "blocks": [
          {
            "type": "p",
            "text": "Industridesign er faget som gjør ideer til fysiske produkter som faktisk fungerer i virkeligheten."
          },
          { "type": "h2", "text": "1. Forstå problemet og stille riktige spørsmål" },
          {
            "type": "p",
            "text": "Før vi tegner noe, må vi forstå hvem vi designer for, hva som ikke fungerer i dag, og hvorfor. Vi stiller spørsmål som: Hvem er brukeren? I hvilken situasjon brukes produktet? Hva er viktigst: pris, holdbarhet, enkel bruk, eller noe annet?"
          },
          {
            "type": "p",
            "text": "Hvorfor dette er viktig: Hvis du starter med feil problem, kan du lage et fint produkt som ingen trenger."
          },
          { "type": "h2", "text": "2. Konseptutvikling og tenke utenfor boksen" },
          {
            "type": "p",
            "text": "I konseptfasen lager vi mange mulige retninger. Målet er ikke å finne én perfekt løsning med en gang, men å utforske nye ideer, utfordre vaner og finne smartere måter å løse problemet på."
          },
          {
            "type": "p",
            "text": "Hvorfor dette er viktig: Flere konsepter gir bedre beslutninger og reduserer risiko for at teamet låser seg til en svak løsning for tidlig."
          },
          { "type": "h2", "text": "3. Skissering og tidlig visualisering" },
          {
            "type": "p",
            "text": "Skisser brukes for å tenke raskt. Vi tegner form, funksjon, grep, størrelse og detaljer for å se hva som kan fungere teknisk og ergonomisk."
          },
          {
            "type": "p",
            "text": "Hvorfor dette er viktig: Det er billig og raskt å endre en skisse, men dyrt å endre et ferdig produkt."
          },
          { "type": "h2", "text": "4. Mockups og prototyper for testing" },
          {
            "type": "p",
            "text": "Etter skisser bygger vi enkle mockups og prototyper. Noen tester kun størrelse og grep, andre tester funksjon, mekanikk eller montering."
          },
          {
            "type": "p",
            "text": "Hvorfor dette er viktig: Prototyper gjør ideen konkret. Du ser raskt hva som faktisk fungerer og hva som må forbedres."
          },
          { "type": "h2", "text": "5. Brukertesting og iterasjoner" },
          {
            "type": "p",
            "text": "Produktet testes av ekte brukere. Vi observerer hvordan de bruker det, hvor de stopper opp, hva som er uklart, og hva som føles bra. Deretter justerer vi designet og tester igjen."
          },
          {
            "type": "p",
            "text": "Hvorfor dette er viktig: Iterasjoner gir et produkt som er lettere å bruke, tryggere og mer relevant for målgruppen."
          },
          { "type": "h2", "text": "6. Visualisering av produkt i bruk" },
          {
            "type": "p",
            "text": "Når retningen er valgt, lager vi visualiseringer som viser produktet i riktig kontekst: hvem som bruker det, hvor det brukes, og hvilken verdi det gir."
          },
          {
            "type": "p",
            "text": "Hvorfor dette er viktig: God visualisering gjør det enklere å forklare ideen internt, hente støtte, og kommunisere tydelig til kunder og investorer."
          },
          { "type": "h2", "text": "7. Presentasjon, salg og beslutning" },
          {
            "type": "p",
            "text": "Designet settes sammen i en tydelig presentasjon: problemet, løsningen, testfunn, forbedringer og veien videre. Dette brukes i salg, crowdfunding og interne beslutninger."
          },
          {
            "type": "p",
            "text": "Hvorfor dette er viktig: En god presentasjon gjør at gode ideer faktisk blir valgt, finansiert og realisert."
          },
          { "type": "h2", "text": "8. Klargjøring for produksjon" },
          {
            "type": "p",
            "text": "Til slutt detaljertes produktet for produksjon: materialer, toleranser, deler, sammensetning, kostnad, emballasje og kvalitet."
          },
          {
            "type": "p",
            "text": "Hvorfor dette er viktig: Uten produksjonsklargjøring stopper prosjektet på idéstadiet. Dette steget gjør designet klart for markedet."
          }
        ]
      }
    </script>
