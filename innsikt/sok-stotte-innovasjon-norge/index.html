    <script id="article-content" type="application/json">
      {
        "title": "Skal du søke støtte hos Innovasjon Norge? Her er det du bør ha på plass først",
        "heroAlt": "Produktutvikling og visualisering før søknad om støtte",
        "blocks": [
          {
            "type": "p",
            "text": "Mange gründere og små bedrifter har gode idéer, men sender søknad til Innovasjon Norge litt for tidlig. Ofte mangler det konkrete ting som gjør det lettere å forstå prosjektet, vurdere potensialet og se hvordan produktet faktisk skal bli til."
          },
          {
            "type": "p",
            "text": "Det betyr ikke at idéen er dårlig. Men jo tydeligere og mer gjennomarbeidet prosjektet er, jo lettere blir det å få interesse og videre støtte."
          },
          {
            "type": "p",
            "text": "Her er noen ting som er smart å ha på plass før man søker, rangert etter viktighet:"
          },
          {
            "type": "h2",
            "text": "1. Et konkret problem som produktet løser."
          },
          {
            "type": "p",
            "text": "Det holder ikke å si at «dette hadde vært kult å lage»."
          },
          {
            "type": "p",
            "text": "Du bør kunne forklare:"
          },
          {
            "type": "ul",
            "items": [
              "Hvem produktet er for? Definere brukergruppe og brukssituasjon. Kvinner mellom 25-45, foreldre med barn under 5 år osv.",
              "Hvilket problem det løser? Enkel og bra formulert setning som forteller hva problemet er og hva er løsningen.",
              "Hvorfor noen faktisk trenger det? Er det ekte behov eller din antagelse? Skaff bevis på faktisk markedsbehov. Det må ikke være mange intervjuer og scenarioer, men veldig konkret tilbakemelding eller «painpoint» som viser at du har snakket med brukeren."
            ]
          },
          {
            "type": "p",
            "text": "Dette er alfa og omega for INs vurdering av prosjektet."
          },
          {
            "type": "h2",
            "text": "2. En tydelig plan videre og skalerbarhet"
          },
          {
            "type": "p",
            "text": "Innovasjon Norge vil ofte se at du har tenkt videre enn første prototype eller første salg. Det handler ikke om et stort Excel-ark, men om at prosjektet viser retning og at det kan vokse hvis det lykkes."
          },
          {
            "type": "p",
            "text": "Du bør kunne svare tydelig på:"
          },
          {
            "type": "ul",
            "items": [
              "hva neste steg er etter støtten (test, pilot, produksjon, marked)",
              "hvordan støtten skal brukes — konkret og realistisk",
              "hva som skjer etterpå, og hvilke milepæler som følger",
              "om produktet kan skaleres: volum, pris, produksjon og distribusjon",
              "hva som må på plass for å gå fra liten serie til større marked"
            ]
          },
          {
            "type": "p",
            "text": "Skalerbarhet betyr ikke at du må ha alt klart fra dag én. Men du bør vise at du har tenkt på hvordan løsningen kan utvikles videre — teknisk, økonomisk og kommersielt — uten at hele prosjektet må bygges om."
          },
          {
            "type": "p",
            "text": "En enkel tidslinje eller faseplan er ofte nok. Poenget er at vurdererne raskt ser at idéen ikke stopper ved en demo, men har et troverdig spor videre."
          },
          {
            "type": "h2",
            "text": "3. Teknisk realisme"
          },
          {
            "type": "p",
            "text": "En vanlig utfordring er at idéen ser bra ut på papir, men er vanskelig eller dyr å produsere. Det er smart å tenke tidlig på:"
          },
          {
            "type": "ul",
            "items": [
              "materialvalg. Bærekraftig eller miljøvennlig? Greit å vise at du har tenkt på dette.",
              "produksjonsmetode. Du trenger ikke å være ekspert på dette, men er realistisk og har forståelse for hva som er mulig.",
              "størrelse og konstruksjon",
              "hvordan produktet faktisk kan bygges. Er det faktisk realistisk å produsere?"
            ]
          },
          {
            "type": "p",
            "text": "Dette gir mye mer troverdighet i søknadsprosessen. <a class=\"internal-text-link\" href=\"/category/teknisk-tegning/norge\">Teknisk tegning</a> og produksjonsklarhet er ofte det som skiller en idé fra noe som kan realiseres."
          },
          {
            "type": "h2",
            "text": "4. Visualisering av idéen"
          },
          {
            "type": "p",
            "text": "Vi er visuelle skapninger og det er vanskelig å vurdere noe når det er ingenting å se på. Mange sitter bare med en tanke eller en enkel skisse. Men det er mye lettere å få støtte når man kan vise noe konkret. Enda bedre produkt i kontekst:"
          },
          {
            "type": "ul",
            "items": [
              "Selvforklarende visualiseringer",
              "Gjennomtenkt konsept",
              "Enkel prototype eller mockup",
              "Hvordan produktet kan se ut i bruk"
            ]
          },
          {
            "type": "p",
            "text": "Folk må forstå idéen raskt."
          },
          {
            "type": "p",
            "text": "Enkleste eksempel er bilde som viser «før/etter». En video eller animasjon kan også være godt men er litt mer krevende. Her hjelper vi ofte til med <a class=\"internal-text-link\" href=\"/category/konseptutvikling/norge\">konseptutvikling</a> og <a class=\"internal-text-link\" href=\"/category/visualisering/norge\">visualiseringer</a> som gjør prosjektet lettere å presentere og forklare videre."
          },
          {
            "type": "h2",
            "text": "5. Prototype eller testmodell"
          },
          {
            "type": "p",
            "text": "Du trenger ikke et ferdig produkt. Men det hjelper veldig å kunne teste:"
          },
          {
            "type": "ul",
            "items": ["funksjon", "størrelse", "brukeropplevelse", "tekniske løsninger"]
          },
          {
            "type": "p",
            "text": "Selv en enkel <a class=\"internal-text-link\" href=\"/category/prototyping/norge\">prototype</a> kan gjøre stor forskjell."
          },
          {
            "type": "h2",
            "text": "Hvordan vi kan hjelpe"
          },
          {
            "type": "p",
            "text": "Jo flere punkter vi har nevnt over du krysser av, jo større sjanse for at IN vil støtte prosjektet. Hos <a class=\"internal-text-link\" href=\"/\">Formaa</a> jobber vi med utvikling av fysiske produkter – fra idé til realisering. Vi kan blant annet hjelpe med:"
          },
          {
            "type": "ul",
            "items": [
              "<a class=\"internal-text-link\" href=\"/category/konseptutvikling/norge\">konseptutvikling</a>",
              "<a class=\"internal-text-link\" href=\"/category/industridesign/norge\">industridesign</a>",
              "<a class=\"internal-text-link\" href=\"/category/prototyping/norge\">prototype</a>",
              "<a class=\"internal-text-link\" href=\"/category/visualisering/norge\">3D-visualisering</a>",
              "produktstrategi",
              "<a class=\"internal-text-link\" href=\"/category/teknisk-tegning/norge\">forberedelse til produksjon</a>"
            ]
          },
          {
            "type": "p",
            "text": "Målet er ikke bare å lage noe som ser bra ut, men å gjøre idéen mer konkret, realistisk og klar for neste steg."
          },
          {
            "type": "p",
            "text": "Mange gode prosjekter stopper fordi de blir værende som idéer. Noen ganger handler det bare om å få ting ut av hodet og over i noe man faktisk kan vise frem, teste og bygge videre på."
          },
          {
            "type": "p",
            "text": "<a class=\"internal-text-link\" href=\"/application-form\">Ta kontakt</a> hvis du vil diskutere prosjektet før en søknad — eller trenger hjelp til å gjøre idéen mer konkret."
          }
        ]
      }
    </script>
