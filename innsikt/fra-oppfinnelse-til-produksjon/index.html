    <script id="article-content" type="application/json">
      {
        "title": "Fra oppfinnelse til produksjon i Norge",
        "heroAlt": "Fra oppfinnelse til produksjon",
        "blocks": [
          {
            "type": "p",
            "text": "Har du en oppfinnelse du vil få produsert? De fleste lykkes best med en tydelig plan i faser — ikke ved å hoppe rett til fabrikk."
          },
          {
            "type": "h2",
            "text": "1. Validér idéen før du produserer"
          },
          {
            "type": "p",
            "text": "Avklar hvem som har problemet, og om løsningen er realistisk å lage og selge. Vi hjelper med <a class=\"internal-text-link\" href=\"/category/konseptutvikling/norge\">utvikle produktidé</a> og enkel <a class=\"internal-text-link\" href=\"/category/markedsundersokelse/norge\">markedsforståelse</a>."
          },
          {
            "type": "h2",
            "text": "2. Design og prototype"
          },
          {
            "type": "p",
            "text": "Lag et produkt du kan ta i hånden. <a class=\"internal-text-link\" href=\"/category/produktdesign/norge\">Produktdesign</a> og <a class=\"internal-text-link\" href=\"/category/prototyping/norge\">prototypeutvikling</a> gjør oppfinnelsen konkret for deg, partnere og investorer."
          },
          {
            "type": "h2",
            "text": "3. Teknisk underlag for produksjon"
          },
          {
            "type": "p",
            "text": "Produsenter trenger <a class=\"internal-text-link\" href=\"/category/cad-modelering/norge\">CAD</a>, <a class=\"internal-text-link\" href=\"/category/teknisk-tegning/norge\">tekniske tegninger</a> og tydelige spesifikasjoner. Dette reduserer feil og gjør det enklere å få produsert oppfinnelsen."
          },
          {
            "type": "h2",
            "text": "4. Finansiering og lansering"
          },
          {
            "type": "p",
            "text": "Mange starter med egenkapital, crowdfunding eller støtteordninger. Les også <a class=\"internal-text-link\" href=\"/innsikt/sok-stotte-innovasjon-norge\">søke støtte hos Innovasjon Norge</a> og vurder <a class=\"internal-text-link\" href=\"/designstudio-oslo\">produktutviklingsbyrå</a> som partner i hele løpet."
          }
        ]
      }
    </script>
