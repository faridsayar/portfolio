    <script id="article-content" type="application/json">
      {
        "title": "Hvordan lage prototype av produktidéen din?",
        "heroAlt": "Prototypeutvikling og 3D-print",
        "blocks": [
          {
            "type": "p",
            "text": "De fleste som kontakter oss har samme utgangspunkt: de har en idé som føles riktig, men de vet ikke helt hvor de skal begynne. Noen har tegnet noe på serviett. Andre har allerede brukt 80 000 kroner på en 3D-print de ikke vet hva de skal gjøre med. Begge deler er helt normalt."
          },
          {
            "type": "p",
            "text": "En prototype er ikke et ferdig produkt. Den er en måte å finne ut om idéen din faktisk fungerer — før du binder deg til verktøy, mold eller en produksjonsserie på tusen enheter. Målet er å lære raskt, ikke å imponere med finish."
          },
          {
            "type": "h2",
            "text": "Hva skal prototypen svare på?"
          },
          {
            "type": "p",
            "text": "Før du bestiller noe som helst, bør du kunne formulere ett konkret spørsmål prototypen skal svare på. Ikke «fungerer produktet?» — det er for bredt. Hellere: «kan brukeren åpne lokket med én hånd?» eller «tåler denne festen belastningen vi har regnet med?»"
          },
          {
            "type": "p",
            "text": "Hvis du ikke klarer å formulere spørsmålet, er du sannsynligvis for tidlig ute med fysisk prototype. Da er det bedre å jobbe med <a class=\"internal-text-link\" href=\"/innsikt/fra-oppfinnelse-til-produksjon\">konseptutvikling</a> først: hvem er produktet for, hva skal det løse, og hva er minimum du må få til i versjon én?"
          },
          {
            "type": "h2",
            "text": "Du trenger ikke perfeksjon første gang"
          },
          {
            "type": "p",
            "text": "Vi ser ofte at folk enten venter for lenge — fordi de vil ha alt på plass i hodet først — eller går rett på dyre løsninger fordi de tror det ser mer profesjonelt ut. Ingen av delene er spesielt smart."
          },
          {
            "type": "p",
            "text": "En enkel mockup av papp, tape og lim kan gi deg mer nyttig informasjon på en ettermiddag enn en polert prototype du har ventet seks uker på. Det handler om hva du skal teste, ikke hvor pent det ser ut. Skal du vise noe til investorer, er det en annen sak — da trenger du ofte bedre finish og kanskje <a class=\"internal-text-link\" href=\"/tjenester-prosess\">visualisering</a> i tillegg."
          },
          {
            "type": "h2",
            "text": "Fra skisse til CAD — når lønner det seg?"
          },
          {
            "type": "p",
            "text": "Skisse på papir er fint i starten. Men så snart du skal teste proporsjoner, montering eller sende filer til en verksted, trenger du <a class=\"internal-text-link\" href=\"/tjenester-prosess\">CAD-modelering</a>. Da kan du måle nøyaktig, sjekke at deler passer sammen, og eksportere filer til 3D-print eller CNC."
          },
          {
            "type": "p",
            "text": "En vanlig feil er å modellere alt i detalj med en gang. Bedre å starte med grov geometri og én kritisk detalj — for eksempel festet mellom to hoveddeler. Får du den til å fungere, bygger du videre. Får du den ikke til, har du spart deg for mye unødvendig arbeid."
          },
          {
            "type": "h2",
            "text": "Velge riktig metode for første fysiske versjon"
          },
          {
            "type": "p",
            "text": "3D-print er raskt og billig for komplekse former, men overflaten og styrken er ofte ikke representativ for sluttproduktet. CNC fra aluminium eller plast gir bedre finish, men koster mer og tar lengre tid. For noen produkter er det smartest å kjøpe standardkomponenter og bygge en «Frankenstein»-prototype rundt dem — spesielt hvis elektronikk eller mekanikk er ukjent terreng."
          },
          {
            "type": "p",
            "text": "Regn med at du trenger flere runder. De fleste prosjekter vi jobber med i <a class=\"internal-text-link\" href=\"/innsikt/hvordan-lage-prototype\">prototypeutvikling</a> går gjennom to til fire iterasjoner før vi er fornøyde nok til å gå videre. Hver runde bør være billigere enn den forrige var verdt."
          },
          {
            "type": "h2",
            "text": "Test med ekte folk, ikke bare deg selv"
          },
          {
            "type": "p",
            "text": "Du kjenner produktet ditt for godt. Du vet hvor knappen sitter, du vet hvordan det skal holdes. En fremmed gjør det feil — og det er akkurat det du trenger å se. Spør noen i målgruppen om de kan bruke prototypen uten at du forklarer. Observer. Noter hvor de stopper opp."
          },
          {
            "type": "p",
            "text": "Ikke spør «liker du det?» — folk er høflige. Spør heller «hva ville du endret?» eller «hvor ville du brukt dette?» Svarene er gull verdt, selv om de sårer litt."
          },
          {
            "type": "h2",
            "text": "Når er du klar for produksjon?"
          },
          {
            "type": "p",
            "text": "Du er ikke klar når prototypen ser bra ut. Du er klar når du vet hva som skal produseres, hvordan, og til hvilken kostnad — og når du har <a class=\"internal-text-link\" href=\"/tjenester-prosess\">tekniske tegninger</a> som en fabrikk faktisk kan forstå. Det er et eget steg, og det kommer etter at du er fornøyd med hvordan produktet fungerer."
          },
          {
            "type": "p",
            "text": "Usikker på hvor du er i prosessen? Ta en titt på <a class=\"internal-text-link\" href=\"/prisestimat\">prisestimat</a> vårt, eller send oss en kort beskrivelse via skjemaet på <a class=\"internal-text-link\" href=\"/\">formaa.no</a>. Da kan vi si ærlig om du bør prototype mer, eller om du er nærmere produksjon enn du tror."
          }
        ]
      }
    </script>
