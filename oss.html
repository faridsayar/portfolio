  <body class="single-page-body">
    <!-- NOTE: Shared navigation component slot. -->
    <div data-component="side-nav"></div>

    <main>
      <section class="section section--white" aria-label="Oss">
        <div class="section-inner">
          <!-- NOTE: Full-bleed top artwork with breadcrumb overlay anchored on image. -->
          <figure class="about-top-graphic">
            <img
              class="about-top-graphic__img"
              src="assets/images/Background-tris.svg"
              alt=""
              loading="lazy"
            />
            <!-- NOTE: Breadcrumb stays visible on top of the artwork. -->
            <figcaption class="about-top-graphic__overlay">
              <!-- NOTE: Intro overlay text above logo; text keeps pure `.section-kicker` typography. -->
              <div class="about-top-graphic__intro-wrap" aria-hidden="true">
                <p class="section-kicker about-top-graphic__intro">vi er</p>
              </div>
              <!-- NOTE: Brand mark centered vertically on artwork, aligned with text column left edge. -->
              <img
                class="about-top-graphic__logo"
                src="assets/formaa-logo.svg"
                alt=""
                aria-hidden="true"
              />
              <nav class="breadcrumb about-top-graphic__breadcrumb" aria-label="Brødsmulesti">
                <a class="breadcrumb__link" href="index.html">Formaa</a>
                <span class="breadcrumb__sep" aria-hidden="true">/</span>
                <a class="breadcrumb__link" href="oss.html" aria-current="page">Oss</a>
              </nav>
            </figcaption>
          </figure>

          <p class="section-kicker">Om oss</p>
          <h1 class="section-title">Vi er</h1>
          <p class="section-lead">
            Tre venner med forskjellige designer-bakgrunner. Vi har bestemt oss for å starte egen
            liten designbyrå for å hjelpe bedrifter og startups med hardcore industridesign og
            produktutvikling.
          </p>
          <p class="section-lead section-lead--after-grid">
            Målet er å tilby en praktisk, tydelig og tilgjengelig produktdesign tjeneste.
          </p>

          <!-- NOTE: Team row with 3 members (image + name + role). -->
          <div class="about-team-grid" aria-label="Team">
            <figure class="about-team-card">
              <img
                class="about-team-card__img"
                src="assets/images/profiles/farid.png"
                alt="Medgründer - industridesign og produktdesign"
              />
              <figcaption class="about-team-card__meta">
                <h3 class="about-team-card__name">Farid</h3>
                <p class="about-team-card__role">Industri designer og prototype spesialist</p>
                <a class="about-team-card__email" href="mailto:hei@formaa.no">hei@formaa.no</a>
              </figcaption>
            </figure>

            <figure class="about-team-card">
              <img
                class="about-team-card__img"
                src="assets/images/profiles/anton.png"
                alt="Medgründer - konsept og strategi"
              />
              <figcaption class="about-team-card__meta">
                <h3 class="about-team-card__name">Anton</h3>
                <p class="about-team-card__role">Produktutvikler og Branding-spesialist</p>
                <a class="about-team-card__email" href="mailto:hei@formaa.no">hei@formaa.no</a>
              </figcaption>
            </figure>

            <figure class="about-team-card">
              <img
                class="about-team-card__img"
                src="assets/images/profiles/leonardo.png"
                alt="Medgründer - prototyping og visualisering"

                <h3 class="about-team-card__name">Leonardo</h3>
                <p class="about-team-card__role">Produktutvikler og Branding-spesialist</p>
                <a class="about-team-card__email" href="mailto:hei@formaa.no">hei@formaa.no</a>
              </figcaption>
