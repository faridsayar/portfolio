    <script id="article-content" type="application/json">
      {
        "title": "UX er ikke produktdesign",
        "heroAlt": "Digital vs fysisk design",
        "blocks": [
          {
            "type": "p",
            "text": "La oss starte diplomatisk: UX er viktig design, og har vokst mye de siste årene. Selv om man kan argumentere at UX-design er produktdesign, er ikke det samme som produktdesign i klassisk forstand, og i hvert fall ikke det samme som industridesign, og absolutt ikke \"the one and only\" produktdesign. "
          },
          {
            "type": "p",
            "text": "La oss fortsette litt mindre diplomatisk, men med kjærlighet: På et tidspunkt ble tittelen \"product designer\" lånt av UX-ere. Lånt lenge. Uten leveringsdato."
          },
          {
            "type": "h2",
            "text": "Er ikke det et produkt?"
          },
          {
            "type": "p",
            "text": "I tech-miljøer vokste UX- og UI-roller raskt, og \"produkt\" ble tolket som app, plattform eller digital tjeneste. Da ble \"product designer\" en naturlig tittel i den konteksten."
          },
          {
            "type": "p",
            "text": "Problemet oppstår når dette blir en universell sannhet, noe det ikke er. Hvis alt er et produkt, blir begrepet \"<a class=\"internal-text-link\" href=\"/category/produktdesign/norge\">produktdesign</a>\" så bredt at det mister mening, og man må uansett presisere hva slags produkt man lager/jobber med/produserer."
          },
          {
            "type": "h2",
            "text": "Alt kan være produkt"
          },
          {
            "type": "p",
            "text": "Ja, en app er et produkt. En banktjeneste er også et produkt, men et digitalt produkt, et skjermprodukt, et virtuelt produkt - velg selv hva du vil kalle det. En fysisk stol er også et produkt, altså et faktisk fysisk produkt. Å grave hull i bakken er også et \"produkt\" i en viss forstand, men de som graver hull kaller det ikke <a class=\"internal-text-link\" href=\"/category/produktdesign/norge\">produktdesign</a>."
          },
          {
            "type": "p",
            "text": "I <a class=\"internal-text-link\" href=\"/category/industridesign/norge\">industridesign</a> må du håndtere form, materialer, mekanikk, ergonomi, sikkerhet, produksjonskostnad, elektroniske toleranser, emballasje og logistikk. Tyngdekraften er ikke et edge-case-scenario. Den er et produktspesifikt krav. Alt handler om produktet hele veien, og selv om interaksjonen med produktet er også en stor og viktig del av produktutviklingen, utfallet og leveransen er et fysisk objekt som er produktet. "
          },
          {
            "type": "h2",
            "text": "UX er en del av flere disipliner"
          },
          {
            "type": "p",
            "text": "Brukeropplevelse er sentralt i UX-design, men også i industridesign og tjenestedesign. Alle spør: Hva trenger brukeren? Hva er friksjonen? Hvordan kan gjøre opplevelsen bedre?"
          },
          {
            "type": "p",
            "text": "Forskjellen ligger i utfallet: UX leverer skjermflyt, interaksjonsmønstre og digital atferd. Industridesign leverer fysiske produkter som skal fungere i den fysiske verden - hånd, rom, produksjon og marked."
          },
          {
            "type": "h2",
            "text": "UX-designer er en and?"
          },
          {
            "type": "p",
            "text": "Ikke som en fornærmelse, men som en elegant påminnelse om at de svømmer briljant i digitale farvann. For å rydde i begrepene: hvorfor ikke kalle UX for DUX, Digital User Experience? Presist, ryddig og ærlig."
          },
          {
            "type": "h2",
            "text": "Hvorfor denne presisjonen betyr noe"
          },
          {
            "type": "p",
            "text": "For det første: hvorfor blande begrepene og gjøre det vanskelig for alle? Jeg mener det er på tide med opprydding i titler i designbransjen og å tegne et tydelig skille mellom ulike designfelt. For det andre: jobbsøk for industridesignere i dag er krevende. Industridesignere må bla gjennom tusenvis av UX-annonser merket \"produktdesign\" for å finne relevante stillinger, samtidig som det allerede finnes få industridesignjobber i Norge. For det tredje: når titler blandes, blir forventningene uklare. Team ansetter feil kompetanse, prosjekter får feil prosess, og man oppdager for sent at ingen eier de fysiske beslutningene."
          },
          {
            "type": "p",
            "text": "Kaller du en <a class=\"internal-text-link\" href=\"/category/industridesign/norge\">industridesigner</a> inn for sent, kan kostnaden bli høy. Kaller du en ren digital rolle inn for tidlig i et fysisk prosjekt, kan viktige produksjonsvalg bli utsatt."
          },
          {
            "type": "h2",
            "text": "Konklusjon: respekt for begge fag"
          },
          {
            "type": "p",
            "text": "UX er ekte design. Et sterkt og kritisk fag. Men det er ikke hele produktdesignfeltet alene. Så hvorfor blande begrepene og gjøre det vanskeligere enn nødvendig? UX er interaksjon, digital opplevelsesdesign, DOD eller DUX på engelsk, ikke design av produktet som ordet \"produktdesign\" tyder på."
          },
          {
            "type": "p",
            "text": "Industridesign er den autentiske produktdesignen, som primært handler om \"et produkt\", og bare den bør beholde retten til å bli kalt produktdesign. \"Produktdesign\" bør brukes tydelig når vi snakker om design av et produkt som resultatt av en reel produksjon av ekte fysiske materialer, mens VR, AR og andre skjermrelaterte interaksjon bør omtales mer presist som digital/virtuell design, som dessuten er i virkeligheten noe underliggende av et reell fysisk produkt som har et skjerm. Til og med i tilfeller der skjerm og interaksjon er nødvendig del av produktet er ikke det et produkt i seg selv, men en del av faktiske produktet. Så hvis du er en UX-designer, hva svarer du når noen spør deg \"Hva jobber du med?\"."
          },
          {
            "type": "p",
            "text": "Så ja: La ducks gjøre det de er best på i digitale miljøer. Vi tar gjerne ansvaret for produkter."
          }
        ]
      }
