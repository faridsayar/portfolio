    <title>UX er ikke produktdesign, UX er UX | Formaa Innsikt</title>

      name="description"
      content="Hvorfor digital UX ofte kalles produktdesign, og hvorfor industridesign fortsatt er avgjørende for fysiske produkter."

    <script id="article-content" type="application/json">
      {
        "title": "UX er ikke produktdesign",
        "heroAlt": "Digital vs fysisk design",
        "blocks": [
          {
            "type": "p",
            "text": "La oss starte diplomatisk: UX er viktig design. Har blitt stor i det siste. Men UX er ikke det samme som produktdesign i klassisk forstand, og i hvert fall ikke det samme som industridesign."
          },
          {
            "type": "p",
            "text": "La oss fortsette litt mindre diplomatisk, men med kjærlighet: På et tidspunkt ble tittelen product designer lånt av UX-ere. Lånt lenge. Uten leveringsdato."
          },
          { "type": "h2", "text": "Er ikke det et produkt?" },
          {
            "type": "p",
            "text": "I tech-miljøer vokste UX- og UI-roller raskt, og produkt ble tolket som app, plattform eller digital tjeneste. Da ble produkt designer en naturlig tittel i den konteksten."
          },
          {
            "type": "p",
            "text": "Problemet oppstår når dette blir universell sannhet, som den ikke er. For hvis alt er et produkt, blir begrepet produktdesign så bredt at det mister mening, og man må uansett presisere hva slags produkt man produserer."
          },
          { "type": "h2", "text": "Alt kan være produkt" },
          {
            "type": "p",
            "text": "Ja, en app er et produkt. En banktjeneste er også et produkt. Og en fysisk stol er også et produkt. Og grave hull i bakken er også et produkt, men de som graver hull kaller ikke det produktdesign."
          },
          {
            "type": "p",
            "text": "I industridesign må du håndtere form, materialer, mekanikk, ergonomi, sikkerhet, produksjonskostnad, elektronikk toleranser, emballasje og logistikk. Tyngdekraften er ikke en edge case scenario. Den er et produktspesifikt krav - alt handler om produktet hele veien."
          },
          { "type": "h2", "text": "UX er en del av flere disipliner" },
          {
            "type": "p",
            "text": "Brukeropplevelse er sentralt i UX-design, men også i industridesign og tjenestedesign. Alle spør: Hva trenger brukeren? Hva er friksjonen? Hvordan gjør vi opplevelsen bedre?"
          },
          {
            "type": "p",
            "text": "Forskjellen ligger i utfallet: UX leverer skjermflyt, interaksjonsmønstre og digital adferd. Industridesign leverer fysiske produkter som skal fungere i fysiske verden - hånd, rom, produksjon og marked."
          },
          { "type": "h2", "text": "UX-designer er en and" },
          {
            "type": "p",
            "text": "Ikke som fornærmelse, men som en elegant påminnelse om at de svømmer briljant i digitale farvann. For å rydde begreper jeg vil kalle UX for DUX: Digital User Experience. Presist, ryddig og ærlig."
          },

          { "type": "h2", "text": "Hvorfor denne presisjonen betyr noe" },
          {
            "type": "p",
            "text": "For det første hvorfor blande begrepene og gjøre det vanskelig for alle. Det er på tide med opprydding i titler i designbransjen og tegne ren skille mellom forskjellige designfelter. Så er det jobbsøk for industridesignere i dag: unge talentfulle produktdesignere må bla gjennom og klikke på tusenvis av UX-design annonser, som ble kalt 'Produktdesign', for å finne frem til riktig jobb. Er vanskelig nok med svært få antall av industridesign jobber i hele landet. For det tredje: Når titler blandes, blir forventninger uklare. Team ansetter feil kompetanse, prosjekt får feil prosess, og man oppdager for sent at ingen eier de fysiske beslutningene."
          },
          {
            "type": "p",
            "text": "Kaller du en industridesigner inn for sent, kan kostnaden bli høy. Kaller du en ren digital rolle inn for tidlig i et fysisk prosjekt, kan viktige produksjonsvalg bli utsatt."
          },
          { "type": "h2", "text": "Konklusjon: respekt for begge fag" },
          {
            "type": "p",
            "text": "UX er ekte design. Sterkt fag. Kritisk fag. Men det er ikke hele produktdesignfeltet alene! Så hvorfor blande begrepene og gjøre det vanskeligere enn det egentlig er? UX er digital opplevelse design, DOD eller DUX på engelsk. Ikke produktdesign."
          },
          {
            "type": "p",
            "text": "Industridesign er produktdesign i fysisk forstand, i den reelle verden vi lever i. Og når digitale og fysiske team samarbeider med tydelige roller, får vi bedre produkter, færre misforståelser og bedre resultater."
          },
          {
            "type": "p",
            "text": "Så ja: La ducks gjøre det de er best på i digitale miljøer. Vi tar gjerne ansvaret for produkter som skal tåle virkeligheten utenfor skjermen."
          }
        ]
      }
    </script>
