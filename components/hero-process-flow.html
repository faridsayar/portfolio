<!-- NOTE: One-line process summary (Concept → CAD → Prototype → Production); used under homepage hero and category banner media. -->
<div class="hero-process-flow" aria-label="Fra konsept til produksjon">
  <p class="hero-process-flow__text">
    <span class="hero-process-flow__step">Konsept</span>
    <img
      class="hero-process-flow__arrow hero-process-flow__arrow--lead"
      src="/assets/small-arrow-right.svg"
      alt=""
      width="12"
      height="12"
      aria-hidden="true"
    />
    <span class="hero-process-flow__step">CAD</span>
    <img
      class="hero-process-flow__arrow"
      src="/assets/small-arrow-right.svg"
      alt=""
      width="10"
      height="10"
      aria-hidden="true"
    />
    <span class="hero-process-flow__step">Prototype</span>
    <img
      class="hero-process-flow__arrow"
      src="/assets/small-arrow-right.svg"
      alt=""
      width="10"
      height="10"
      aria-hidden="true"
    />
    <span class="hero-process-flow__step">Produksjon</span>
  </p>
</div>
