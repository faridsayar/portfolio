    <rect x="48" y="4" width="44" height="44" rx="2" fill="#00B67A" />
    <use href="#tp-star" x="57" y="15" fill="#fff" />
    <rect x="96" y="4" width="44" height="44" rx="2" fill="#00B67A" />
    <use href="#tp-star" x="105" y="15" fill="#fff" />
    <rect x="144" y="4" width="44" height="44" rx="2" fill="#00B67A" />
